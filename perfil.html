<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil</title>
</head>
<body>

    <h1>Minha Biblioteca de Mídias</h1>

    <form action="processa_perfil.php" method="post">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        <br><br>

        <label for="turma">Turma:</label>
        <input type="text" id="turma" name="turma" required>
        <br><br>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" min="10" max="100" required>
        <br><br>

        <label for="tipo_midia">Estilo musical favorito:</label>
        <select id="tipo_midia" name="tipo_midia" required>
            <option value="">Selecione</option>
            <option value="axe">Axé</option>
            <option value="classica">Clássica</option>
            <option value="rock">Rock</option>
            <option value="pop">POP</option>
            <option value="psicodelia">Psicodelia</option>
            <option value="rap">Rap</option>
            <option value="samba">Samba</option>
            <option value="soul">Soul</option>
            <option value="eletronica">Eletronica</option>
            <option value="musica_gaucha">Música Gaúcha</option>
        </select>
        <br><br>

        <label for="obra">Obra favorita:</label>
        <input type="text" id="obra" name="obra" required>
        <br><br>

        <label for="cantor">Cantor favorita:</label>
        <input type="text" id="cantor" name="cantor">
        <br><br>

        <label for="nota">Nota de 0 a 10:</label>
        <input type="number" id="nota" name="nota" min="0" max="10" required>
        <br><br>

        <label for="comentario">Comentario:</label>
        <br>
        <textarea id="comentario" name="comentario" required></textarea>
        <br><br>

        <button type="submit">Criar perfil</button>

    </form>

</body>
</html>
